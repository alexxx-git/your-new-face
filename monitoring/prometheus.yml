global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: generation
    metrics_path: /api/generation-metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: nvidia-gpu-exporter
    static_configs:
      - targets:
          - nvidia-gpu-exporter:9835

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090