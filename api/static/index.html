<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your New Face</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255,255,255,0.95);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }
        h1 { 
            color: #4a5568; 
            font-size: 2.5rem; 
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .status { 
            background: #f7fafc; 
            padding: 1.5rem; 
            border-radius: 12px; 
            margin: 2rem 0;
            border-left: 5px solid #48bb78;
        }
        button { 
            background: linear-gradient(45deg, #48bb78, #38a169);
            color: white; 
            border: none; 
            padding: 1rem 2rem; 
            border-radius: 50px; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(72,187,120,0.3);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(72,187,120,0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        #result { margin-top: 1rem; font-weight: bold; color: #2d3748; }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎭 Your New Face</h1>
        <div class="status" id="status">Готов к обработке лиц</div>
        <button id="processBtn">🚀 Обработать лицо</button>
        <div id="result"></div>
        <div style="margin-top: 2rem; font-size: 0.9rem; color: #718096;">
            <p>Flower: <a href="http://localhost:5555" target="_blank">localhost:5555</a></p>
            <p>API: <a href="/api/docs" target="_blank">/api/docs</a></p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('processBtn');
        const status = document.getElementById('status');
        const resultDiv = document.getElementById('result');
        
        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.textContent = '⏳ Обрабатываем...';
            status.textContent = 'PENDING';
            status.classList.add('loading');
            
            try {
                // 1. Создаём задачу
                const taskRes = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({face_path: 'demo_face.jpg'})
                });
                const taskData = await taskRes.json();
                
                // 2. Polling статус
                const pollStatus = async () => {
                    const res = await fetch(`/api/tasks/${taskData.task_id}`);
                    const data = await res.json();
                    
                    status.textContent = data.status;
                    if (data.ready) {
                        status.classList.remove('loading');
                        resultDiv.innerHTML = `<strong>✅ Результат:</strong> ${JSON.stringify(data.result, null, 2)}`;
                        btn.disabled = false;
                        btn.textContent = '🚀 Обработать ещё';
                        return;
                    }
                    setTimeout(pollStatus, 2000);
                };
                pollStatus();
                
            } catch (error) {
                status.textContent = '❌ Ошибка';
                resultDiv.textContent = error.message;
                btn.disabled = false;
                btn.textContent = '🚀 Попробовать снова';
            }
        });
    </script>
</body>
</html>
