[project]
name = "your-new-face"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = "==3.11.*"
dependencies = [
    "pre-commit>=4.5.1",
    "python-dotenv>=1.2.1",
    "ruff>=0.14.11",
    "torch>=2.0.0",
    "opencv-python>=4.8.0",
    "mediapipe>=0.10.0",
    "numpy<2",
    "pillow>=10.0.0",
    "onnxruntime-gpu>=1.24.4",
    "insightface",
]

[dependency-groups]
# Для разработки и тестирования
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
    "mypy>=1.5.0", 
]

# Для запуска API (FastAPI)
api = [
    "fastapi>=0.104.0",
    "uvicorn>=0.24.0",
    "python-multipart>=0.0.6",
    "pydantic>=2.0.0",
]

# Для ML с GPU (NVIDIA CUDA)
ml-gpu = [
    "torch>=2.0.0",
    "torchvision>=0.15.0",
    "torchaudio>=2.0.0",
    "onnxruntime-gpu>=1.16.0",
    "gfpgan>=1.3.8",
    "realesrgan>=0.3.0",
]

# Для ML с CPU (без CUDA)
ml-cpu = [
    "torch>=2.0.0",
    "torchvision>=0.15.0",
    "torchaudio>=2.0.0",
    "onnxruntime>=1.16.0",
    "gfpgan>=1.3.8",
    "realesrgan>=0.3.0",
]

# Для развёртывания (Docker, production)
deploy = [
    "gunicorn>=21.0.0",
    "redis>=5.0.0",
    "celery>=5.3.0",
    "boto3>=1.28.0",
]

# Для мониторинга и логирования
monitoring = [
    "prometheus-client>=0.19.0",
    "structlog>=23.0.0",
    "sentry-sdk>=1.30.0",
]

[tool.uv.sources]
insightface = { path = "new_face/whl/insightface-0.7.3-cp311-cp311-win_amd64.whl" }
