services:
  minio: 
    image: minio/minio:latest
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
    - minio_data:/data
    # need specify path
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

  rmq:
    build: ./rmq
    ports:
    - "${RMQ_PORT}:5672"
    - "${RMQ_MANAGEMENT_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RMQ_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s


  celery_worker:
    build: .
    depends_on:
      - rmq
      # - api
    environment:
      - RMQ_URL=amqp://${RMQ_USER}:${RMQ_PASSWORD}@${RMQ_HOST}:${RMQ_PORT}/
      - API_URL=http://${API_HOST}:${API_PORT}/update_task_status_api/
      - PYTHONPATH=/yournewface  
    restart: always
    working_dir: /yournewface/api
    entrypoint: celery -A celery_app worker --loglevel=info --concurrency=1
    #concurrency=1 on my luck



  flower:
    build: .
    # command: celery -A api.celery_app flower --port=5555
    ports:
      - 5555:5555
    depends_on:
      - rmq
      - celery_worker
    environment:
     - PYTHONPATH=/yournewface
     - RMQ_URL=amqp://${RMQ_USER}:${RMQ_PASSWORD}@${RMQ_HOST}:${RMQ_PORT}/
    restart: always
    working_dir: /yournewface/api
    entrypoint: celery -A celery_app flower --port=5555
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      - PYTHONPATH=/yournewface
    depends_on:
      - rmq
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./api/static:/var/www/static:ro  
    depends_on:
      - api
    restart: always
  static:
    image: nginx:alpine
    volumes:
      - ./api/static:/usr/share/nginx/html:ro
    expose:
    - "80"
  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - grafana-storage:/var/lib/grafana

volumes:
  minio_data:
  grafana-storage: